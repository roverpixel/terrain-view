<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D DEM & Ortho Viewer</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
      }
      #app {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(255, 255, 255, 0.9);
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        width: 250px;
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }
      .control-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 10px;
      }
      label {
        font-size: 12px;
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
      }
      input[type=range] {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <h1>Terrain Viewer</h1>
      <div class="control-group">
        <label for="exaggeration">
          <span>Z-Axis Exaggeration</span>
          <span id="exag-val">1.0</span>
        </label>
        <input type="range" id="exaggeration" min="0.1" max="10" step="0.1" value="1.0" />
      </div>
      <p style="font-size: 10px; color: #666; margin-top: 10px;">
        Drag to rotate/tilt camera.
      </p>
    </div>
    <div id="app"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
